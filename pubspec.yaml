name: biketunes
description: BikeTunes — FarDriver controller tuning app for electric dirt bikes
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Bluetooth
  flutter_blue_plus: ^1.35.3

  # State management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Charts
  fl_chart: ^0.69.0

  # Fonts
  google_fonts: ^6.2.1

  # Storage
  shared_preferences: ^2.3.2
  path_provider: ^2.1.4

  # Permissions
  permission_handler: ^11.3.1

  # Data export
  csv: ^6.0.0

  # Utils
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.13
  riverpod_generator: ^2.4.3
  custom_lint: ^0.7.6
  riverpod_lint: ^2.3.10

flutter:
  uses-material-design: true
